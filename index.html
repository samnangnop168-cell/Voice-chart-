<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Cloud Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <style>
        :root { --main: #0984e3; --bg: #f5f6fa; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 400px; }
        .btn { width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer; background: #eee; transition: 0.3s; margin: 10px; }
        .recording { background: #ff7675 !important; animation: pulse 1s infinite; }
        .history { width: 100%; max-width: 400px; margin-top: 25px; }
        .item { background: white; padding: 12px; margin-bottom: 8px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; border-left: 4px solid var(--main); }
        .dl-btn { background: var(--main); color: white; padding: 5px 12px; border-radius: 5px; text-decoration: none; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,118,117,0.4); } 70% { box-shadow: 0 0 0 15px rgba(255,118,117,0); } }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="status">Ready to Sync</h2>
        <button id="startBtn" class="btn"><svg viewBox="0 0 24 24" width="30"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg></button>
        <button id="stopBtn" class="btn" disabled><svg viewBox="0 0 24 24" width="30"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4z"/></svg></button>
    </div>

    <div class="history">
        <h3>Cloud History (Last 3 Days)</h3>
        <div id="list">Loading files...</div>
    </div>

    <script>
        // PASTE YOUR GOOGLE WEB APP URL HERE
        const scriptURL = "https://script.google.com/macros/s/AKfycbznT8RNn7GypGG536OBvhbSDPZ-M7l4Mgc1cRjyyG7jih5rfU9zknvIQzgGDyBrMtq7/exec";
        
        let audioCtx, encoder, chunks = [];

        async function loadHistory() {
            try {
                const res = await fetch(scriptURL);
                const data = await res.json();
                const listDiv = document.getElementById('list');
                listDiv.innerHTML = "";
                // Show rows from sheet (skip header row)
                data.slice(1).reverse().forEach(row => {
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.innerHTML = `<span>${new Date(row[0]).toLocaleTimeString()}</span> <a href="${row[2]}" class="dl-btn" target="_blank">View MP3</a>`;
                    listDiv.appendChild(div);
                });
            } catch (e) { document.getElementById('list').innerText = "Syncing..."; }
        }

        document.getElementById('startBtn').onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new AudioContext();
            encoder = new lamejs.Mp3Encoder(1, audioCtx.sampleRate, 128);
            chunks = [];
            const source = audioCtx.createMediaStreamSource(stream);
            const processor = audioCtx.createScriptProcessor(4096, 1, 1);

            processor.onaudioprocess = e => {
                const pcm = e.inputBuffer.getChannelData(0);
                const int16 = new Int16Array(pcm.length);
                for (let i = 0; i < pcm.length; i++) int16[i] = pcm[i] < 0 ? pcm[i] * 32768 : pcm[i] * 32767;
                const buf = encoder.encodeBuffer(int16);
                if (buf.length > 0) chunks.push(new Uint8Array(buf));
            };

            source.connect(processor);
            processor.connect(audioCtx.destination);
            document.getElementById('startBtn').classList.add('recording');
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('status').innerText = "Recording...";
        };

        document.getElementById('stopBtn').onclick = async () => {
            document.getElementById('status').innerText = "Uploading to Cloud...";
            const final = encoder.flush();
            if (final.length > 0) chunks.push(new Uint8Array(final));
            const blob = new Blob(chunks, { type: 'audio/mp3' });
            
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = async () => {
                const base64data = reader.result.split(',')[1];
                await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({ base64: base64data, name: `voice_${Date.now()}.mp3` })
                });
                document.getElementById('status').innerText = "Sync Complete";
                loadHistory();
            };

            audioCtx.close();
            document.getElementById('startBtn').classList.remove('recording');
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        };

        loadHistory(); // Load on start
        setInterval(loadHistory, 10000); // Check for new files from other devices every 10 seconds
    </script>
</body>
</html>
