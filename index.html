<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Level Voice Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <style>
        :root { --primary: #0984e3; --bg: #f1f2f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        input { width: 80%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        .btn { width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer; margin: 10px; background: #eee; }
        .recording { background: #ff7675 !important; animation: pulse 1s infinite; }
        .history { width: 100%; max-width: 400px; margin-top: 25px; }
        .item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); }
        .info { text-align: left; }
        .name-tag { color: var(--primary); font-weight: bold; font-size: 13px; }
        .open-btn { background: var(--primary); color: white; padding: 6px 12px; border-radius: 6px; text-decoration: none; font-size: 12px; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="card">
        <h3>User Name</h3>
        <input type="text" id="userName" placeholder="Enter Your Name..." />
        <div id="status">Ready</div>
        <button id="startBtn" class="btn">START</button>
        <button id="stopBtn" class="btn" disabled>STOP</button>
    </div>

    <div class="history">
        <h3>Shared History (Last 3 Days)</h3>
        <div id="list">Loading...</div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycby-zogy5JyYQHqcbE3SM6Vj0hlmim7gWLuc-VbEvcMMPs6ASii60Eg6yvCo_K0Z73DI/exec"; // PASTE NEW URL HERE
        
        // Auto-load name from memory
        document.getElementById('userName').value = localStorage.getItem('savedName') || "";

        let audioCtx, encoder, chunks = [];

        async function loadHistory() {
            try {
                const res = await fetch(scriptURL + "?t=" + Date.now());
                const data = await res.json();
                const list = document.getElementById('list');
                list.innerHTML = data.length > 1 ? "" : "<em>No records.</em>";
                
                data.slice(1).reverse().forEach(row => {
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.innerHTML = `
                        <div class="info">
                            <div class="name-tag">${row[1]}</div>
                            <div style="font-size:12px;">${new Date(row[0]).toLocaleTimeString()}</div>
                        </div>
                        <a href="${row[2]}" target="_blank" class="open-btn">OPEN MP3</a>
                    `;
                    list.appendChild(div);
                });
            } catch (e) { document.getElementById('list').innerText = "Syncing..."; }
        }

        document.getElementById('startBtn').onclick = async () => {
            const name = document.getElementById('userName').value;
            if(!name) { alert("Please enter your name first!"); return; }
            localStorage.setItem('savedName', name);

            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new AudioContext();
            encoder = new lamejs.Mp3Encoder(1, audioCtx.sampleRate, 128);
            chunks = [];
            const source = audioCtx.createMediaStreamSource(stream);
            const proc = audioCtx.createScriptProcessor(4096, 1, 1);
            proc.onaudioprocess = e => {
                const pcm = e.inputBuffer.getChannelData(0);
                const int16 = new Int16Array(pcm.length);
                for (let i = 0; i < pcm.length; i++) int16[i] = pcm[i] < 0 ? pcm[i] * 32768 : pcm[i] * 32767;
                const buf = encoder.encodeBuffer(int16);
                if (buf.length > 0) chunks.push(new Uint8Array(buf));
            };
            source.connect(proc); proc.connect(audioCtx.destination);
            document.getElementById('startBtn').classList.add('recording');
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('status').innerText = "Recording...";
        };

        document.getElementById('stopBtn').onclick = async () => {
            document.getElementById('status').innerText = "Syncing to Cloud...";
            const final = encoder.flush();
            if (final.length > 0) chunks.push(new Uint8Array(final));
            const blob = new Blob(chunks, { type: 'audio/mp3' });
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = async () => {
                const base64 = reader.result.split(',')[1];
                await fetch(scriptURL, { 
                    method: 'POST', 
                    body: JSON.stringify({ 
                        base64: base64, 
                        name: `v_${Date.now()}.mp3`,
                        userName: document.getElementById('userName').value 
                    }) 
                });
                document.getElementById('status').innerText = "Done!";
                loadHistory();
            };
            audioCtx.close();
            document.getElementById('startBtn').classList.remove('recording');
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        };

        loadHistory();
        setInterval(loadHistory, 15000); 
    </script>
</body>
</html>
