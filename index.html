<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Pro - Local & Cloud</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <style>
        :root { --blue: #007aff; --red: #ff3b30; --bg: #f2f2f7; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        input { width: 85%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #ddd; text-align: center; font-size: 16px; }
        .btn { width: 75px; height: 75px; border-radius: 50%; border: none; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; margin: 5px; }
        #startBtn { background: var(--blue); }
        #stopBtn { background: #8e8e93; }
        .recording { background: var(--red) !important; animation: pulse 1s infinite; }
        .history { width: 100%; max-width: 380px; margin-top: 25px; }
        .item { background: white; padding: 15px; margin-bottom: 8px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--blue); }
        .user-tag { font-weight: bold; color: #1c1c1e; }
        .time-tag { font-size: 11px; color: #8e8e93; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="card">
        <h2>Report Voice</h2>
        <input type="text" id="userName" placeholder="Type Your Name..." />
        <div id="status" style="margin-bottom:15px; font-weight:bold; color:#555">Ready</div>
        <button id="startBtn" class="btn">REC</button>
        <button id="stopBtn" class="btn" disabled>STOP</button>
    </div>

    <div class="history">
        <h3>Recent Records (Local)</h3>
        <div id="list">No history yet.</div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwZofma_cjcwjhtwRK_56P1rvzAVDRGzxfMVFSf9DFqyuhdxayCLVuiFygkveCUnXFO/exec"; 
        
        document.getElementById('userName').value = localStorage.getItem('last_user') || "";
        updateUI();

        let audioCtx, encoder, chunks = [];

        function updateUI() {
            const history = JSON.parse(localStorage.getItem('my_history') || "[]");
            const list = document.getElementById('list');
            if (history.length === 0) return;
            list.innerHTML = "";
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<div><div class="user-tag">${item.name}</div><div class="time-tag">${item.time}</div></div>
                                 <div style="font-size:10px; color:green;">✓ RECORDED</div>`;
                list.appendChild(div);
            });
        }

        document.getElementById('startBtn').onclick = async () => {
            const name = document.getElementById('userName').value;
            if(!name) return alert("Enter Name!");
            localStorage.setItem('last_user', name);

            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new AudioContext();
            encoder = new lamejs.Mp3Encoder(1, audioCtx.sampleRate, 128);
            chunks = [];
            const source = audioCtx.createMediaStreamSource(stream);
            const proc = audioCtx.createScriptProcessor(4096, 1, 1);
            proc.onaudioprocess = e => {
                const pcm = e.inputBuffer.getChannelData(0);
                const int16 = new Int16Array(pcm.length);
                for (let i = 0; i < pcm.length; i++) int16[i] = pcm[i] < 0 ? pcm[i] * 32768 : pcm[i] * 32767;
                const buf = encoder.encodeBuffer(int16);
                if (buf.length > 0) chunks.push(new Uint8Array(buf));
            };
            source.connect(proc); proc.connect(audioCtx.destination);
            document.getElementById('startBtn').classList.add('recording');
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('status').innerText = "RECORDING...";
        };

        document.getElementById('stopBtn').onclick = async () => {
            const name = document.getElementById('userName').value;
            const now = new Date();
            const timeStr = now.toLocaleTimeString() + " " + now.toLocaleDateString();

            // 1. Instant Local Save
            let hist = JSON.parse(localStorage.getItem('my_history') || "[]");
            hist.unshift({ name: name, time: timeStr });
            localStorage.setItem('my_history', JSON.stringify(hist.slice(0, 10)));
            updateUI();

            // 2. Prepare Cloud Sync
            document.getElementById('status').innerText = "SYNCING TO DRIVE...";
            const final = encoder.flush();
            if (final.length > 0) chunks.push(new Uint8Array(final));
            const blob = new Blob(chunks, { type: 'audio/mp3' });
            
            // File format: Name_Date_Time.mp3
            const fileName = `${name}_${now.getDate()}-${now.getMonth()+1}_${now.getHours()}-${now.getMinutes()}.mp3`;

            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = async () => {
                const base64 = reader.result.split(',')[1];
                fetch(scriptURL, { 
                    method: 'POST', 
                    body: JSON.stringify({ base64: base64, name: fileName, userName: name }) 
                }).then(() => {
                    document.getElementById('status').innerText = "CLOUD SYNC OK";
                });
            };

            audioCtx.close();
            document.getElementById('startBtn').classList.remove('recording');
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        };
    </script>
</body>
</html>
