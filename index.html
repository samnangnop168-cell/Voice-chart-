<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Recorder (3-Day History)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <style>
        :root { --primary: #6c5ce7; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .recorder-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 400px; }
        .history-list { width: 100%; max-width: 400px; margin-top: 20px; }
        .item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary); }
        .btn { width: 60px; height: 60px; border-radius: 50%; border: 1px solid #ddd; cursor: pointer; background: white; }
        .recording { background: #ff7675 !important; border: none; animation: pulse 1s infinite; }
        .export-link { background: var(--primary); color: white; padding: 6px 12px; border-radius: 6px; text-decoration: none; font-size: 12px; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,118,117,0.4); } 70% { box-shadow: 0 0 0 15px rgba(255,118,117,0); } }
    </style>
</head>
<body>

    <div class="recorder-card">
        <h2 id="status">Ready</h2>
        <div style="display:flex; justify-content:center; gap:15px;">
            <button id="startBtn" class="btn"><svg viewBox="0 0 24 24" width="24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg></button>
            <button id="stopBtn" class="btn" disabled><svg viewBox="0 0 24 24" width="24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4z"/></svg></button>
        </div>
    </div>

    <div class="history-list">
        <h3>History (Auto-deletes after 3 days)</h3>
        <div id="list"></div>
    </div>

    <script>
        let db, audioCtx, processor, source, encoder, chunks = [];

        // 1. Open Database
        const request = indexedDB.open("VoiceArchiveDB", 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("recordings", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = e => { 
            db = e.target.result; 
            cleanupOldRecords(); // Run auto-delete on start
            loadList(); 
        };

        // 2. Auto-Delete Logic
        function cleanupOldRecords() {
            const transaction = db.transaction(["recordings"], "readwrite");
            const store = transaction.objectStore("recordings");
            const now = Date.now();
            const threeDaysInMs = 3 * 24 * 60 * 60 * 1000;

            store.openCursor().onsuccess = e => {
                const cursor = e.target.result;
                if (cursor) {
                    const recordDate = cursor.value.timestamp;
                    if (now - recordDate > threeDaysInMs) {
                        cursor.delete(); // Delete if older than 3 days
                        console.log("Deleted an old record");
                    }
                    cursor.continue();
                }
            };
        }

        // 3. Recorder Logic
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        startBtn.onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new AudioContext();
            encoder = new lamejs.Mp3Encoder(1, audioCtx.sampleRate, 128);
            chunks = [];
            source = audioCtx.createMediaStreamSource(stream);
            processor = audioCtx.createScriptProcessor(4096, 1, 1);

            processor.onaudioprocess = e => {
                const pcm = e.inputBuffer.getChannelData(0);
                const int16 = new Int16Array(pcm.length);
                for (let i = 0; i < pcm.length; i++) int16[i] = pcm[i] < 0 ? pcm[i] * 32768 : pcm[i] * 32767;
                const buf = encoder.encodeBuffer(int16);
                if (buf.length > 0) chunks.push(new Uint8Array(buf));
            };

            source.connect(processor);
            processor.connect(audioCtx.destination);
            startBtn.classList.add('recording');
            startBtn.disabled = true; stopBtn.disabled = false;
            document.getElementById('status').innerText = "Recording...";
        };

        stopBtn.onclick = () => {
            const final = encoder.flush();
            if (final.length > 0) chunks.push(new Uint8Array(final));
            const blob = new Blob(chunks, { type: 'audio/mp3' });
            
            // Save with Timestamp
            const transaction = db.transaction(["recordings"], "readwrite");
            const store = transaction.objectStore("recordings");
            store.add({ 
                blob: blob, 
                timestamp: Date.now(), 
                dateStr: new Date().toLocaleString() 
            });

            transaction.oncomplete = () => loadList();

            source.mediaStream.getTracks().forEach(t => t.stop());
            audioCtx.close();
            startBtn.classList.remove('recording');
            startBtn.disabled = false; stopBtn.disabled = true;
            document.getElementById('status').innerText = "Saved to History";
        };

        function loadList() {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = "";
            db.transaction("recordings").objectStore("recordings").openCursor(null, "prev").onsuccess = e => {
                const cursor = e.target.result;
                if (cursor) {
                    const div = document.createElement('div');
                    div.className = 'item';
                    const url = URL.createObjectURL(cursor.value.blob);
                    div.innerHTML = `
                        <span>${cursor.value.dateStr}</span>
                        <a href="${url}" download="voice_${cursor.value.id}.mp3" class="export-link">Export MP3</a>
                    `;
                    listDiv.appendChild(div);
                    cursor.continue();
                }
            };
        }
    </script>
</body>
</html>
