<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Voice Cloud</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <style>
        :root { --primary: #007aff; --danger: #ff3b30; --bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .main-card { background: white; border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; }
        
        .rec-btn { width: 90px; height: 90px; border-radius: 50%; border: none; cursor: pointer; background: var(--primary); color: white; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,122,255,0.3); }
        .rec-btn:disabled { background: #ccc; box-shadow: none; }
        .recording { background: var(--danger); animation: pulse 1.5s infinite; }
        
        .history-container { width: 100%; max-width: 400px; margin-top: 25px; }
        .history-item { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.03); border-left: 5px solid var(--primary); }
        
        .open-btn { background: var(--primary); color: white; text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        small { color: #8e8e93; display: block; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="main-card">
        <h2 id="status">Voice Cloud</h2>
        <button id="startBtn" class="rec-btn">REC</button>
        <button id="stopBtn" class="rec-btn" style="background:#555; margin-left:10px" disabled>STOP</button>
    </div>

    <div class="history-container">
        <h3>Cloud History</h3>
        <div id="list">Checking for records...</div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycby-2hbcxhBDxzTiMh4WLCHk_3PwF1iNMw54KyKliDmXIsWWJjWCW7zelc2rTyllUAYD/exec"; // PASTE URL HERE
        let audioCtx, encoder, chunks = [];

        async function fetchHistory() {
            try {
                const res = await fetch(scriptURL + "?t=" + Date.now());
                const data = await res.json();
                const list = document.getElementById('list');
                list.innerHTML = data.length > 1 ? "" : "<em>No data found.</em>";
                data.slice(1).reverse().forEach(row => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `<div><b>${new Date(row[0]).toLocaleTimeString()}</b><small>${new Date(row[0]).toLocaleDateString()}</small></div>
                                     <a href="${row[2]}" target="_blank" class="open-btn">OPEN</a>`;
                    list.appendChild(div);
                });
            } catch (e) { document.getElementById('list').innerText = "Connecting..."; }
        }

        document.getElementById('startBtn').onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new AudioContext();
            encoder = new lamejs.Mp3Encoder(1, audioCtx.sampleRate, 128);
            chunks = [];
            const source = audioCtx.createMediaStreamSource(stream);
            const proc = audioCtx.createScriptProcessor(4096, 1, 1);
            proc.onaudioprocess = e => {
                const pcm = e.inputBuffer.getChannelData(0);
                const int16 = new Int16Array(pcm.length);
                for (let i = 0; i < pcm.length; i++) int16[i] = pcm[i] < 0 ? pcm[i] * 32768 : pcm[i] * 32767;
                const buf = encoder.encodeBuffer(int16);
                if (buf.length > 0) chunks.push(new Uint8Array(buf));
            };
            source.connect(proc); proc.connect(audioCtx.destination);
            document.getElementById('startBtn').classList.add('recording');
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('status').innerText = "Recording...";
        };

        document.getElementById('stopBtn').onclick = async () => {
            document.getElementById('status').innerText = "Uploading...";
            const final = encoder.flush();
            if (final.length > 0) chunks.push(new Uint8Array(final));
            const blob = new Blob(chunks, { type: 'audio/mp3' });
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = async () => {
                const base64 = reader.result.split(',')[1];
                await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ base64: base64, name: `rec_${Date.now()}.mp3` }) });
                document.getElementById('status').innerText = "Sync Done";
                fetchHistory();
            };
            audioCtx.close();
            document.getElementById('startBtn').classList.remove('recording');
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        };

        fetchHistory();
        setInterval(fetchHistory, 10000); 
    </script>
</body>
</html>
