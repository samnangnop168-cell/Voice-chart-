<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Sync Cloud</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <style>
        :root { --blue: #0984e3; --red: #ff7675; }
        body { font-family: sans-serif; background: #f1f2f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 90%; max-width: 380px; }
        .btn { width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer; background: #eee; margin: 10px; transition: 0.3s; }
        .recording { background: var(--red) !important; animation: pulse 1.2s infinite; }
        .recording svg { fill: white !important; }
        .history { width: 90%; max-width: 380px; margin-top: 30px; }
        .item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--blue); }
        .view-link { background: var(--blue); color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: bold; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,118,117,0.4); } 70% { box-shadow: 0 0 0 20px rgba(255,118,117,0); } }
    </style>
</head>
<body>

<div class="card">
    <h2 id="status">Cloud Sync Ready</h2>
    <button id="startBtn" class="btn"><svg viewBox="0 0 24 24" width="35"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></button>
    <button id="stopBtn" class="btn" disabled><svg viewBox="0 0 24 24" width="35"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4z"/></svg></button>
</div>

<div class="history">
    <h3>3-Day History</h3>
    <div id="list">Checking Cloud...</div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzTNMDXcalE8_SCLZx6_YdeUQ4NotEEImlKHUd8OeMEHdtIa_3bau-E1J9qt1sU39iL/exec";
    let audioCtx, encoder, chunks = [];

    async function loadHistory() {
        try {
            const res = await fetch(scriptURL + "?t=" + Date.now());
            const data = await res.json();
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = (data.length <= 1) ? "<em>No recent recordings.</em>" : "";
            data.slice(1).reverse().forEach(row => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<div><b>${new Date(row[0]).toLocaleTimeString()}</b><br><small>${new Date(row[0]).toLocaleDateString()}</small></div>
                                 <a href="${row[2]}" target="_blank" class="view-link">OPEN MP3</a>`;
                listDiv.appendChild(div);
            });
        } catch (e) { document.getElementById('list').innerText = "Connecting..."; }
    }

    document.getElementById('startBtn').onclick = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new AudioContext();
        encoder = new lamejs.Mp3Encoder(1, audioCtx.sampleRate, 128);
        chunks = [];
        const source = audioCtx.createMediaStreamSource(stream);
        const proc = audioCtx.createScriptProcessor(4096, 1, 1);
        proc.onaudioprocess = e => {
            const pcm = e.inputBuffer.getChannelData(0);
            const int16 = new Int16Array(pcm.length);
            for (let i = 0; i < pcm.length; i++) int16[i] = pcm[i] < 0 ? pcm[i] * 32768 : pcm[i] * 32767;
            const buf = encoder.encodeBuffer(int16);
            if (buf.length > 0) chunks.push(new Uint8Array(buf));
        };
        source.connect(proc); proc.connect(audioCtx.destination);
        document.getElementById('startBtn').classList.add('recording');
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('status').innerText = "Recording...";
    };

    document.getElementById('stopBtn').onclick = async () => {
        document.getElementById('status').innerText = "Uploading...";
        const final = encoder.flush();
        if (final.length > 0) chunks.push(new Uint8Array(final));
        const blob = new Blob(chunks, { type: 'audio/mp3' });
        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ base64: base64, name: `v_${Date.now()}.mp3` }) });
            document.getElementById('status').innerText = "Sync Complete";
            loadHistory();
        };
        audioCtx.close();
        document.getElementById('startBtn').classList.remove('recording');
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
    };

    loadHistory();
    setInterval(loadHistory, 15000); // Refresh every 15 seconds
</script>
</body>
</html>
