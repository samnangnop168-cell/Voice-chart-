<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Cloud Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); }
        .rec-btn { width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer; background: var(--primary); color: white; transition: 0.3s; margin: 10px; }
        .recording { background: #ff3b30 !important; animation: pulse 1s infinite; }
        .history { width: 100%; max-width: 400px; }
        .item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .user-tag { font-weight: bold; color: var(--primary); font-size: 14px; }
        .time-tag { font-size: 11px; color: #888; margin-top: 2px; }
        .view-btn { background: var(--primary); color: white; text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: bold; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="margin-top:0">Cloud Voice Sync</h2>
        <input type="text" id="userName" placeholder="Enter Your Name..." />
        <div id="status" style="margin-bottom:15px; color:#555">Ready</div>
        <button id="startBtn" class="rec-btn">START</button>
        <button id="stopBtn" class="rec-btn" style="background:#555" disabled>STOP</button>
    </div>

    <div class="history">
        <h3 style="padding-left:10px">Shared History</h3>
        <div id="list">Connecting to Cloud...</div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbxnwwYKw1EjVsvJjhvBGTkbK1_HrUOL9jJ1vBPny9-Cvp-0RxVPjeX4fy7S_Xizshs/exec"; // PASTE YOUR URL HERE
        
        // Remember Name
        document.getElementById('userName').value = localStorage.getItem('user_name') || "";

        let audioCtx, encoder, chunks = [];

        async function loadHistory() {
            try {
                const res = await fetch(scriptURL + "?t=" + Date.now());
                const data = await res.json();
                const list = document.getElementById('list');
                list.innerHTML = data.length > 1 ? "" : "<em>No records found.</em>";
                
                data.slice(1).reverse().forEach(row => {
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.innerHTML = `
                        <div>
                            <div class="user-tag">${row[1]}</div>
                            <div class="time-tag">${new Date(row[0]).toLocaleTimeString()} - ${new Date(row[0]).toLocaleDateString()}</div>
                        </div>
                        <a href="${row[2]}" target="_blank" class="view-btn">OPEN</a>
                    `;
                    list.appendChild(div);
                });
            } catch (e) { document.getElementById('list').innerText = "Syncing..."; }
        }

        document.getElementById('startBtn').onclick = async () => {
            const user = document.getElementById('userName').value;
            if(!user) return alert("Please enter your name!");
            localStorage.setItem('user_name', user);

            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new AudioContext();
            encoder = new lamejs.Mp3Encoder(1, audioCtx.sampleRate, 128);
            chunks = [];
            const source = audioCtx.createMediaStreamSource(stream);
            const proc = audioCtx.createScriptProcessor(4096, 1, 1);
            proc.onaudioprocess = e => {
                const pcm = e.inputBuffer.getChannelData(0);
                const int16 = new Int16Array(pcm.length);
                for (let i = 0; i < pcm.length; i++) int16[i] = pcm[i] < 0 ? pcm[i] * 32768 : pcm[i] * 32767;
                const buf = encoder.encodeBuffer(int16);
                if (buf.length > 0) chunks.push(new Uint8Array(buf));
            };
            source.connect(proc); proc.connect(audioCtx.destination);
            document.getElementById('startBtn').classList.add('recording');
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('status').innerText = "Recording...";
        };

        document.getElementById('stopBtn').onclick = async () => {
            document.getElementById('status').innerText = "Syncing to Drive...";
            const final = encoder.flush();
            if (final.length > 0) chunks.push(new Uint8Array(final));
            const blob = new Blob(chunks, { type: 'audio/mp3' });
            
            const user = document.getElementById('userName').value;
            const now = new Date();
            const fileName = `${user}_${now.getDate()}-${now.getMonth()+1}_${now.getHours()}-${now.getMinutes()}.mp3`;

            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = async () => {
                const base64 = reader.result.split(',')[1];
                await fetch(scriptURL, { 
                    method: 'POST', 
                    body: JSON.stringify({ base64: base64, name: fileName, userName: user }) 
                });
                document.getElementById('status').innerText = "Sync Complete!";
                loadHistory();
            };
            audioCtx.close();
            document.getElementById('startBtn').classList.remove('recording');
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        };

        loadHistory();
        setInterval(loadHistory, 15000); // Auto-sync every 15 seconds
    </script>
</body>
</html>
