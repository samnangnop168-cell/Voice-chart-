<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Voice Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .btn { width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer; margin: 10px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .recording { background: #ff4757 !important; color: white; animation: pulse 1s infinite; }
        .history-item { background: white; padding: 10px; margin: 10px auto; border-radius: 10px; display: flex; justify-content: space-between; max-width: 400px; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); } }
    </style>
</head>
<body>

    <h2>Auto-Sync Voice</h2>
    <button id="startBtn" class="btn">START</button>
    <button id="stopBtn" class="btn" disabled>STOP</button>

    <h3>Global History</h3>
    <div id="historyList">Loading sync...</div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbyAh1RL5jxEdJCXWuyuWRfVcAcbCJk1HmsgsZZzyx1_ld7SlNx1qfRhNrLTA_SI3lwj/exec";
        let audioCtx, encoder, chunks = [];

        // Load History from Google Sheet
        async function loadHistory() {
            const res = await fetch(scriptURL);
            const data = await res.json();
            const list = document.getElementById('historyList');
            list.innerHTML = "";
            data.slice(1).reverse().forEach(row => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `<span>${new Date(row[0]).toLocaleTimeString()}</span> <a href="${row[2]}" target="_blank">Download MP3</a>`;
                list.appendChild(item);
            });
        }

        document.getElementById('startBtn').onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new AudioContext();
            encoder = new lamejs.Mp3Encoder(1, audioCtx.sampleRate, 128);
            chunks = [];
            const source = audioCtx.createMediaStreamSource(stream);
            const processor = audioCtx.createScriptProcessor(4096, 1, 1);

            processor.onaudioprocess = e => {
                const pcm = e.inputBuffer.getChannelData(0);
                const int16 = new Int16Array(pcm.length);
                for (let i = 0; i < pcm.length; i++) int16[i] = pcm[i] < 0 ? pcm[i] * 32768 : pcm[i] * 32767;
                const buf = encoder.encodeBuffer(int16);
                if (buf.length > 0) chunks.push(new Uint8Array(buf));
            };

            source.connect(processor);
            processor.connect(audioCtx.destination);
            document.getElementById('startBtn').classList.add('recording');
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        };

        document.getElementById('stopBtn').onclick = async () => {
            const final = encoder.flush();
            if (final.length > 0) chunks.push(new Uint8Array(final));
            const blob = new Blob(chunks, { type: 'audio/mp3' });
            
            // Convert to Base64 to send to Google
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = async () => {
                const base64data = reader.result.split(',')[1];
                await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({
                        base64: base64data,
                        name: `voice_${Date.now()}.mp3`
                    })
                });
                loadHistory();
            };

            audioCtx.close();
            document.getElementById('startBtn').classList.remove('recording');
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        };

        loadHistory();
    </script>
</body>
</html>
